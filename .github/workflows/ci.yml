name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate JSON metadata
        run: |
          jq empty server.json
          jq empty glama.json

      - name: Validate Smithery YAML
        run: npx -y yaml valid smithery.yaml

      - name: Verify canonical MCP endpoint references
        run: |
          grep -q "https://www.regdatalab.com/mcp" README.md
          grep -q "https://www.regdatalab.com/connect.md" README.md
          grep -q "https://www.regdatalab.com/connect.md" index.html
